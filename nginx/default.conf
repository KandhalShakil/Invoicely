# =============================================================================
# Nginx Configuration — Enterprise Invoice Management System
# OWASP-hardened production proxy with security headers and rate limiting
# =============================================================================

# Rate limiting zones — defined at http context (in nginx.conf they'd be global,
# here we scope them for use inside this server block)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=static_limit:10m rate=100r/m;

# =============================================================================
# HTTP Server — Redirect all traffic to HTTPS
# =============================================================================
server {
    listen 80;
    server_name _;

    # Health check endpoint (used by load balancers, doesn't redirect)
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server — Primary production server
# =============================================================================
server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL Certificate (managed by Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # File upload size limit (matches Django FILE_UPLOAD_MAX_MEMORY_SIZE)
    client_max_body_size 10M;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 120s;

    # ==========================================================================
    # OWASP Security Headers
    # ==========================================================================

    # Prevent browsers from sniffing content-type
    add_header X-Content-Type-Options "nosniff" always;

    # Prevent clickjacking
    add_header X-Frame-Options "DENY" always;

    # XSS protection (legacy browsers)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer policy — don't leak path info
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions policy — disable unnecessary browser APIs
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # HSTS — force HTTPS for 1 year including subdomains
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy — restrict resource origins
    add_header Content-Security-Policy "
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data: https://*.amazonaws.com blob:;
        connect-src 'self' wss: https:;
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self';
    " always;

    # Hide Nginx version from attackers
    server_tokens off;

    # ==========================================================================
    # React Frontend — Static SPA Files
    # ==========================================================================
    location / {
        root /var/www/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==========================================================================
    # Django REST API
    # ==========================================================================
    location /api/v1/ {
        # API rate limiting: 30 req/min with burst of 10
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        # Strip server version headers from backend
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
    }

    # Stricter rate limit on auth endpoints
    location /api/v1/auth/login/ {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Django Admin (restrict access by IP if possible)
    # ==========================================================================
    location /admin/ {
        # Uncomment and configure to restrict admin to specific IPs:
        # allow 10.0.0.0/8;     # Internal network
        # allow 203.0.113.0/24; # Your office IP range
        # deny all;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # WebSocket — Django Channels (real-time notifications)
    # ==========================================================================
    location /ws/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;   # Keep WebSocket alive for 24h
        proxy_send_timeout 86400s;
    }

    # ==========================================================================
    # API Documentation (Swagger UI)
    # ==========================================================================
    location /api/docs/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ==========================================================================
    # Static & Media Files
    # ==========================================================================
    location /static/ {
        alias /var/www/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    location /media/ {
        alias /var/www/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # ==========================================================================
    # Security: Block common attack vectors
    # ==========================================================================

    # Block hidden files (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }

    # Block access to sensitive files
    location ~* \.(env|log|conf|sql|bak|swp)$ {
        deny all;
        return 404;
    }

    # Deny PHP requests (we're a Python app)
    location ~* \.php$ {
        deny all;
        return 404;
    }
}
